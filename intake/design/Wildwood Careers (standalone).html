document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"7f80aee1-ee41-4da5-8321-335fbefea49d\"><\u002Fscript>\n<style>\n:root{\n  --navy:#163a5f;\n  --navy-2:#0e335c;\n  --navy-deep:#0a2c52;\n  --footer:#062a52;\n  --gold:#e0a23b;\n  --gold-dark:#c8881f;\n  --gold-soft:#f1c873;\n  --blue-soft:#dde8f6;\n  --blue-soft-2:#cddcf0;\n  --blue-tint:#eaf2fb;\n  --ink:#52606f;\n  --ink-2:#6c7886;\n  --line:#e3ebf3;\n  --display:\"Playfair Display\",Georgia,serif;\n  --sans:\"Lato\",-apple-system,Segoe UI,sans-serif;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{\n  font-family:var(--sans);\n  color:var(--ink);\n  background:#fff;\n  -webkit-font-smoothing:antialiased;\n  line-height:1.65;\n  font-size:16px;\n}\n.wrap{max-width:1180px;margin:0 auto;padding:0 40px;}\n.eyebrow{\n  font-family:var(--sans);\n  font-weight:700;\n  text-transform:uppercase;\n  letter-spacing:.18em;\n  color:var(--gold);\n  font-size:13px;\n}\nh1,h2,h3,h4{font-family:var(--display);color:var(--navy);font-weight:700;line-height:1.12;}\n.serif{font-family:var(--display);color:var(--navy);}\n.u-line{display:block;width:64px;height:3px;background:var(--gold);border-radius:2px;}\n.u-line.center{margin:18px auto 0;}\nimg-fallback{display:block;}\nimage-slot{display:block;}\n\n/* ============ HERO ============ */\n.hero{\n  position:relative;\n  overflow:hidden;\n  background:\n    radial-gradient(120% 90% at 12% 18%, #eef5fc 0%, #e3eef9 42%, #d8e7f6 100%);\n  isolation:isolate;\n}\n.hero-grid{\n  display:grid;\n  grid-template-columns:1.02fr 1fr;\n  align-items:center;\n  min-height:560px;\n}\n.hero-copy{padding:76px 0 120px 0;max-width:560px;}\n.hero h1{\n  font-size:72px;\n  font-weight:800;\n  letter-spacing:-.01em;\n  margin:18px 0 0;\n  color:#1c3a5e;\n}\n.hero-copy .u-line{margin-top:24px;}\n.hero p{margin-top:26px;max-width:470px;font-size:16.5px;color:#52606f;}\n.hero p + p{margin-top:18px;}\n.hero-cta{display:flex;gap:16px;margin-top:38px;flex-wrap:wrap;}\n\n.btn{\n  display:inline-flex;align-items:center;gap:11px;\n  font-family:var(--sans);font-weight:700;font-size:15px;\n  padding:15px 24px;border-radius:7px;cursor:pointer;\n  text-decoration:none;border:1.5px solid transparent;\n  transition:transform .18s ease, background .18s ease, box-shadow .18s ease, color .18s ease;\n}\n.btn svg{width:19px;height:19px;}\n.btn-navy{background:var(--navy);color:#fff;box-shadow:0 10px 24px rgba(14,51,92,.22);}\n.btn-navy:hover{background:#0f2f50;transform:translateY(-2px);box-shadow:0 14px 30px rgba(14,51,92,.3);}\n.btn-ghost{background:#fff;color:var(--navy);border-color:#dfe7ef;box-shadow:0 8px 20px rgba(20,54,95,.08);}\n.btn-ghost svg{color:var(--gold);}\n.btn-ghost:hover{transform:translateY(-2px);box-shadow:0 12px 26px rgba(20,54,95,.14);border-color:var(--gold-soft);}\n.btn-gold{background:linear-gradient(180deg,#eaad44,#d8901f);color:#fff;box-shadow:0 10px 24px rgba(200,136,31,.28);}\n.btn-gold:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(200,136,31,.38);filter:brightness(1.04);}\n\n/* hero photo + organic curve */\n.hero-photo{\n  position:absolute;top:0;right:0;height:100%;width:52%;z-index:-1;\n}\n.hero-photo image-slot{width:100%;height:100%;}\n.hero-curve{\n  position:absolute;top:0;left:-2px;height:100%;width:160px;z-index:1;\n  color:#e3eef9;pointer-events:none;\n}\n.hero-curve svg{height:100%;width:100%;display:block;}\n.hero-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;z-index:2;display:block;}\n\n/* ============ VALUES ============ */\n.section{padding:84px 0;}\n.sec-head{text-align:center;max-width:720px;margin:0 auto;}\n.sec-head h2{font-size:40px;margin-top:14px;}\n.sec-head p{margin-top:20px;color:#52606f;font-size:16.5px;}\n.values{\n  display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-top:60px;\n}\n.value{text-align:center;position:relative;padding:0 12px;}\n.value:not(:last-child)::after{\n  content:\"\";position:absolute;top:18px;right:-14px;width:1px;height:120px;background:var(--line);\n}\n.badge{\n  width:78px;height:78px;border-radius:50%;\n  background:radial-gradient(120% 120% at 50% 25%,#e7f0fb,#d8e6f6);\n  display:flex;align-items:center;justify-content:center;margin:0 auto 22px;\n  color:var(--navy);box-shadow:inset 0 0 0 1px rgba(20,54,95,.05);\n}\n.badge svg{width:34px;height:34px;}\n.value h3{font-size:20px;}\n.value .u-line{margin:12px auto 16px;width:44px;height:2.5px;}\n.value p{font-size:14.5px;color:#647383;line-height:1.6;}\n\n/* ============ ROLES ============ */\n.roles{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-top:34px;align-items:stretch;}\n.role{\n  background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;\n  display:flex;flex-direction:column;\n  box-shadow:0 10px 30px rgba(20,54,95,.13);\n  transition:transform .2s ease, box-shadow .2s ease;\n}\n.role:hover{transform:translateY(-4px);box-shadow:0 22px 46px rgba(20,54,95,.12);}\n.role-body{padding:16px 22px 14px;flex:1;}\n.role-top{display:flex;align-items:center;gap:13px;}\n.role-ic{\n  width:58px;height:58px;border-radius:50%;flex:0 0 auto;\n  background:radial-gradient(120% 120% at 50% 25%,#e7f0fb,#d8e6f6);\n  display:flex;align-items:center;justify-content:center;color:var(--navy);\n}\n.role-ic svg{width:30px;height:30px;}\n.role h3{font-size:18px;line-height:1.18;}\n.role .u-line{width:40px;height:2.5px;margin:9px 0 0;}\n.role-head{min-width:0;}\n.role p{font-size:13.7px;color:#647383;line-height:1.62;margin-top:14px;}\n.role image-slot{width:100%;height:148px;}\n\n/* ============ CONTACT PANEL ============ */\n.panel{\n  background:linear-gradient(170deg,#e9f1fb 0%,#dde9f6 100%);\n  border-radius:16px;padding:42px 56px 44px;\n}\n.panel .sec-head h2{font-size:36px;}\n.contact-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:48px;}\n.contact-col{padding:0 34px;position:relative;}\n.contact-c lor:#aebccd;line-height:1.65;}\n.foot-bar{border-top:1px solid rgba(255,255,255,.12);padding:26px 0;}\n.foot-bar .wrap{display:flex;align-items:center;justify-content:center;gap:26px;flex-wrap:wrap;font-size:14px;color:#9fb0c4;}\n.foot-bar a{color:#9fb0c4;text-decoration:none;}\n.foot-bar a:hover{color:#fff;}\n.foot-bar .sep{color:rgba(255,255,255,.25);}\n\n@media (max-width:920px){\n  .hero-grid{grid-template-columns:1fr;}\n  .hero-copy{padding:60px 0 90px;max-width:none;}\n  .hero-photo{position:relative;width:100%;height:340px;z-index:0;}\n  .hero-curve{display:none;}\n  .values,.roles{grid-template-columns:repeat(2,1fr);}\n  .value:not(:last-child)::after{display:none;}\n  .contact-grid,.foot-grid,.office-grid,.two,.openings{grid-template-columns:1fr;}\n  .contact-col:not(:last-child)::after{display:none;}\n  .contact-col{padding:0 0 28px;}\n  .hero h1{font-size:52px;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ===================== HERO ===================== -->\n<header class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"hero-photo\">\n    <image-slot id=\"hero-team\" fit=\"cover\" placeholder=\"Drop team photo\"><\u002Fimage-slot>\n  <\u002Fdiv>\n  <div class=\"hero-curve\">\n    <svg viewBox=\"0 0 160 600\" preserveAspectRatio=\"none\" fill=\"none\">\n      <path d=\"M0,0 H120 C40,180 40,420 120,600 H0 Z\" fill=\"currentColor\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"hero-grid\">\n      <div class=\"hero-copy\">\n        <span class=\"eyebrow\">Careers at Wildwood Dental Clinic<\u002Fspan>\n        <h1>Join Our Team<\u002Fh1>\n        <span class=\"u-line\"><\u002Fspan>\n        <p>Wildwood Dental Clinic is excited to connect with passionate, qualified professionals who are committed to delivering exceptional, patient-centred care.<\u002Fp>\n        <p>We welcome individuals who bring positivity, teamwork, and a genuine desire to make every patient feel comfortable, valued, and confident in their smi

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --navy:#163a5f;\n  --navy-2:#0e335c;\n  --navy-deep:#0a2c52;\n  --hero-1:#194067;\n  --hero-2:#0c2645;\n  --footer:#0d2c52;\n  --gold:#e0a23b;\n  --gold-dark:#c8881f;\n  --gold-soft:#f1c873;\n  --blue-soft:#dde8f6;\n  --blue-tint:#eaf2fb;\n  --panel:#f4f6f9;\n  --ink:#52606f;\n  --ink-2:#6c7886;\n  --line:#e3ebf3;\n  --display:\"Playfair Display\",Georgia,serif;\n  --sans:\"Lato\",-apple-system,Segoe UI,sans-serif;\n}\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nbody{\n  font-family:var(--sans);\n  color:var(--ink);\n  background:#fff;\n  -webkit-font-smoothing:antialiased;\n  line-height:1.65;\n  font-size:16px;\n}\n.wrap{max-width:1180px;margin:0 auto;padding:0 40px;}\n.eyebrow{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--gold);font-size:13px;}\nh1,h2,h3,h4{font-family:var(--display);color:var(--navy);font-weight:700;line-height:1.14;}\n.serif{font-family:var(--display);color:var(--navy);}\n.u-line{display:block;width:64px;height:3px;background:var(--gold);border-radius:2px;}\n.u-line.center{margin:18px auto 0;}\n.u-line.sm{width:46px;height:2.5px;}\n\n/* buttons */\n.btn{\n  display:inline-flex;align-items:center;gap:11px;\n  font-family:var(--sans);font-weight:700;font-size:15px;\n  padding:15px 24px;border-radius:7px;cursor:pointer;\n  text-decoration:none;border:1.5px solid transparent;\n  transition:transform .18s ease, background .18s ease, box-shadow .18s ease, filter .18s ease;\n}\n.btn svg{width:18px;height:18px;}\n.btn-gold{background:linear-gradient(180deg,#eaad44,#d8901f);color:#fff;box-shadow:0 10px 24px rgba(200,136,31,.28);}\n.btn-gold:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(200,136,31,.38);filter:brightness(1.04);}\n.btn-navy{background:linear-gradient(180deg,#1c4570,#102f54);color:#fff;box-shadow:0 10px 24px rgba(16,47,84,.28);}\n.btn-navy:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(16,47,84,.36);filter:brightness(1.06);}\n\n/* ============ HEADER (light, sticky) ============ */\n.site-header{\n  position:sticky;top:0;z-index:30;background:rgba(255,255,255,.95);\n  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);\n}\n.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 0;}\n.brand{display:flex;flex-direction:column;align-items:flex-start;gap:3px;text-decoration:none;}\n.brand .mark{display:flex;gap:5px;margin-bottom:2px;}\n.brand .mark svg{width:15px;height:17px;color:var(--gold);}\n.brand .name{font-family:var(--display);color:var(--navy);font-weight:700;font-size:23px;letter-spacing:.06em;line-height:1;}\n.brand .sub{font-family:var(--sans);color:var(--ink-2);font-weight:700;font-size:9.5px;letter-spacing:.34em;}\n.nav-links{display:flex;align-items:center;gap:32px;}\n.nav-links a{color:var(--navy);text-decoration:none;font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:6px;transition:color .16s ease;}\n.nav-links a:hover{color:var(--gold-dark);}\n.nav-links a svg{width:12px;height:12px;opacity:.8;}\n.nav-cta{background:linear-gradient(180deg,#eaad44,#d8901f);color:#fff;padding:12px 20px;border-radius:7px;font-weight:700;font-size:14.5px;text-decoration:none;display:inline-flex;align-items:center;gap:9px;box-shadow:0 10px 22px rgba(200,136,31,.28);transition:transform .18s ease, filter .18s ease;}\n.nav-cta:hover{transform:translateY(-2px);filter:brightness(1.05);}\n.nav-cta svg{width:15px;height:15px;}\n\n/* ============ HERO ============ */\n.hero{position:relative;overflow:hidden;background:linear-gradient(180deg,#f2f7fc 0%,#e4edf7 100%);}\n.hero .wrap{position:relative;z-index:3;}\n.hero-copy{padding:96px 0 124px;max-width:560px;}\n.hero-copy .eyebrow{display:block;}\n.hero h1{font-size:62px;font-weight:800;letter-spacing:-.01em;margin-top:16px;line-height:1.06;}\n.hero .u-line{margin-top:24px;}\n.hero p{margin-top:26px;font-size:18.5px;color:#465468;max-width:440px;line-height:1.65;}\n/* photo on the right */\n.hero-media{position:absolute;top:0;right:0;height:100%;width:50%;z-index:0;}\n.hero-media img{width:100%;height:100%;object-fit:cover;display:block;}\n/* soft horizontal fade so the photo's left edge melts into the page */\n.hero-media::after{content:\"\";position:absolute;inset:0;z-index:1;background:linear-gradient(95deg,#eaf1f9 0%,rgba(234,241,249,.72) 14%,rgba(234,241,249,.25) 30%,transparent 48%);}\n/* organic curved boundary (filled with the page gradient) + soft shadow for depth */\n.hero-curve{position:absolute;top:0;left:calc(50% - 132px);height:100%;width:176px;z-index:2;pointer-events:none;filter:drop-shadow(-10px 0 22px rgba(20,54,95,.10));}\n.hero-curve svg{height:100%;width:100%;display:block;}\n.hero-wave{position:absolute;left:0;right:0;bottom:-1px;width:100%;z-index:4;display:block;}\n\n/* ============ FAQ MAIN ============ */\n.faq-main{padding:74px 0 84px;}\n.faq-layout{display:grid;grid-template-columns:300px 1fr;gap:48px;align-items:start;}\n\n/* sidebar */\n.cat-list{display:flex;flex-direction:column;gap:10px;}\n.cat{\n  display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;\n  background:#fff;border:1px solid var(--line);border-radius:9px;padding:15px 18px;\n  font-family:var(--sans);font-weight:700;font-size:15.5px;color:var(--navy);\n  text-decoration:none;transition:border-color .16s ease, background .16s ease, transform .16s ease, box-shadow .16s ease;\n}\n.cat svg.ci{width:19px;height:19px;color:var(--gold-dark);flex:0 0 auto;transition:color .16s ease;}\n.cat .cat-name{flex:1;}\n.cat .chev{width:16px;height:16px;color:#aab6c4;flex:0 0 auto;transition:transform .16s ease, color .16s ease;}\n.cat:hover{border-color:#cdddee;transform:translateX(2px);box-shadow:0 8px 22px rgba(20,54,95,.06);}\n.cat:hover .chev{transform:translateX(3px);color:var(--gold-dark);}\n.cat.active{background:linear-gradient(165deg,#1c4570,#102f54);border-color:transparent;color:#fff;box-shadow:0 12px 28px rgba(16,47,84,.26);}\n.cat.active svg.ci{color:var(--gold-soft);}\n.cat.active .chev{color:rgba(255,255,255,.7);}\n\n.help-card{margin-top:26px;background:linear-gradient(165deg,#eef4fc,#e4eef9);border:1px solid #dbe6f4;border-radius:12px;padding:26px 24px;}\n.help-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;}\n.help-ic{width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:inset 0 0 0 1px rgba(20,54,95,.08), 0 6px 16px rgba(20,54,95,.08);display:flex;align-items:center;justify-content:center;color:var(--navy);flex:0 0 auto;}\n.help-ic svg{width:24px;height:24px;}\n.help-card h3{font-size:19px;line-height:1.25;}\n.help-card p.h-sub{margin-top:8px;color:#56637a;font-size:14.5px;}\n.help-mail{margin-top:16px;display:flex;align-items:flex-start;gap:10px;}\n.help-mail svg{width:17px;height:17px;color:var(--gold-dark);flex:0 0 auto;margin-top:3px;}\n.help-mail a{color:var(--gold-dark);font-weight:700;font-size:14px;text-decoration:none;word-break:break-word;line-height:1.5;}\n.help-mail a:hover{text-decoration:underline;}\n.help-note{margin-top:16px;padding-top:16px;border-top:1px solid rgba(20,54,95,.12);color:#647383;font-size:13.5px;line-height:1.55;}\n\n/* accordion column */\n.faq-head{display:flex;align-items:center;gap:18px;margin-bottom:30px;}\n.faq-head .rule{height:1px;background:var(--line);flex:1;}\n.faq-head .tooth{width:44px;height:44px;color:var(--gold);flex:0 0 auto;}\n.faq-head .tooth svg{width:100%;height:100%;}\n\n.faq-list{display:flex;flex-direction:column;gap:13px;}\n.faq{border:1px solid var(--line);border-radius:9px;background:#fff;overflow:hidden;transition:box-shadow .18s ease,border-color .18s ease;}\n.faq[open]{box-shadow:0 12px 30px rgba(20,54,95,.07);border-color:#d6e2ef;}\n.faq summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-betwe        <details class=\"faq\">\n            <summary>Do you offer emergency dental care?<span class=\"pm\"><\u002Fspan><\u002Fsummary>\n            <div class=\"ans\">Yes. Dental emergencies can't wait, so we make every effort to see patients in pain or distress as soon as possible — often the same day. If you're experiencing an emergency, call us right away and we'll guide you on the next steps.<\u002Fdiv>\n          <\u002Fdetails>\n          <details class=\"faq\">\n            <summary>Do you offer direct billing to insurance?<span class=\"pm\"><\u002Fspan><\u002Fsummary>\n            <div class=\"ans\">We're pleased to offer direct billing to most major insurance providers, so you only pay the portion not covered by your plan. Bring your insurance details to your visit and our team will handle the claim submission for you.<\u002Fdiv>\n          <\u002Fdetails>\n          <details class=\"faq\">\n            <summary>When should my child first visit the dentist?<span class=\"pm\"><\u002Fspan><\u002Fsummary>\n            <div class=\"ans\">We recommend a child's first dental visit by their first birthday, or within six months of their first tooth appearing. Early visits help us monitor healthy development and make the dentist a positive, familiar experience from the start.<\u002Fdiv>\n          <\u002Fdetails>\n          <details class=\"faq\">\n            <summary>What should I do in a dental emergency?<span class=\"pm\"><\u002Fspan><\u002Fsummary>\n            <div class=\"ans\">Contact us as soon as possible so we can advise you and arrange to be seen. For a knocked-out tooth, keep it moist and avoid touching the root; for swelling or severe pain, a cold compress can help until you reach us. When in doubt, call — we'll talk you through it.<\u002Fdiv>\n          <\u002Fdetails>\n          <details class=\"faq\">\n            <summary>What services do you offer?<span class=\"pm\"><\u002Fspan><\u002Fsummary>\n            <div class=\"ans\">Wildwood Dental Clinic provides comprehensive care for the whole family — including preventive and family dentistry, cosmetic treatments, children's dentistry, emergency services, and more. If you're not sure which service fits your needs, our team can point you in the right direction.<\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== STILL HAVE QUESTIONS ===================== -->\n<section class=\"shq-sec\" data-screen-label=\"Still Have Questions\">\n  <div class=\"wrap\">\n    <div class=\"shq\">\n      <span class=\"shq-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"2\"><\u002Frect><path d=\"M16 2v4\"><\u002Fpath><path d=\"M8 2v4\"><\u002Fpath><path d=\"M3 10h18\"><\u002Fpath><path d=\"m9 16 2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <div class=\"shq-copy\">\n        <h2 class=\"serif\">Still Have Questions?<\u002Fh2>\n        <p>Our friendly team is always happy to help. Reach out and we'll be glad to assist you.<\u002Fp>\n      <\u002Fdiv>\n      <span class=\"shq-div\"><\u002Fspan>\n      <a class=\"btn btn-navy\" href=\"#\">Request Appointment\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FEATURE ROW ===================== -->\n<section class=\"feat-sec\" data-screen-label=\"Why Wildwood\">\n  <div class=\"wrap\">\n    <div class=\"feat-row\">\n      <div class=\"feat-card\">\n        <span class=\"feat-ic\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><

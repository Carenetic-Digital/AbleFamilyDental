name: Deploy to Production (CF) and CMS (Fly.io)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure npm for GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}" >> ~/.npmrc
          echo "@sparkable-cms:registry=https://npm.pkg.github.com" >> ~/.npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Tell the staging CMS on fly.io to pull the merged commit and re-apply
      # any unpublished client edits. Non-fatal: if the CMS is cold-starting or
      # unreachable, startup sync in entrypoint.sh will catch up on the next
      # container boot. FLY_CMS_URL is the base URL (e.g. https://app.fly.dev)
      # and SPARKABLE_SYNC_SECRET must also be set on the fly app.
      - name: Sync CMS (fly.io)
        env:
          FLY_CMS_URL: ${{ secrets.FLY_CMS_URL }}
          SPARKABLE_SYNC_SECRET: ${{ secrets.SPARKABLE_SYNC_SECRET }}
        run: |
          if [ -z "$FLY_CMS_URL" ] || [ -z "$SPARKABLE_SYNC_SECRET" ]; then
            echo "::notice::FLY_CMS_URL or SPARKABLE_SYNC_SECRET not set — skipping CMS sync."
            exit 0
          fi
          HTTP_STATUS=$(curl -sS -o /tmp/sync-response.json -w '%{http_code}' \
            -X POST "${FLY_CMS_URL%/}/_sparkable/api/sync" \
            -H "X-Sparkable-Sync-Secret: $SPARKABLE_SYNC_SECRET" \
            --max-time 120) || true
          echo "Response status: $HTTP_STATUS"
          echo "Response body:"
          cat /tmp/sync-response.json || true
          echo
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::CMS sync returned $HTTP_STATUS — the fly container will reconcile on next boot."
          fi

      # Restart the fly machine so Astro re-loads modules from the freshly-pulled
      # source. The sync POST above advances the volume's working tree, but the
      # running Astro process keeps its already-imported modules in memory —
      # the editor preview can keep serving pre-merge code until the process
      # restarts. The entrypoint mints a fresh GitHub App token on boot, which
      # also sidesteps the "sync silently returns 200 against an expired token"
      # gotcha (CLAUDE.md gotcha #10). Non-fatal: a flaky restart shouldn't
      # block a deploy that already succeeded. Soft-skips when FLY_API_TOKEN
      # is missing so the deploy still works before the CMS is wired up.
      - name: Restart fly machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP_NAME: v08-wildwood-dental
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::notice::FLY_API_TOKEN not set — skipping fly machine restart."
            exit 0
          fi
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          MACHINE_ID=$(flyctl machines list --app "$FLY_APP_NAME" --json | jq -r '.[0].id')
          if [ -z "$MACHINE_ID" ] || [ "$MACHINE_ID" = "null" ]; then
            echo "::warning::No machines found in $FLY_APP_NAME — skipping restart."
            exit 0
          fi
          echo "Restarting machine $MACHINE_ID..."
          flyctl machine restart "$MACHINE_ID" --app "$FLY_APP_NAME" || \
            echo "::warning::flyctl machine restart failed — entrypoint will sync on next boot."
